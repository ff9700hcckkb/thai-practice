<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --accent-color: #e67e22;
            --btn-inactive: #3a3a3a;
            --btn-active: #3498db;
            --search-bg: #333;
            --link-color: #2ecc71;
            --danger-color: #e74c3c;
            --star-color: #f1c40f;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 10px 15px 60px 15px; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        /* 頂部選單容器 */
        .source-selector {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 10px 0;
            z-index: 100;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            background: var(--btn-inactive);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 網格調整為 3x3 以容納「我的收藏」 */
        .grid-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .source-btn {
            padding: 12px 2px;
            border-radius: 10px;
            border: none;
            background: var(--btn-inactive);
            color: var(--sub-text);
            font-weight: 600;
            font-size: 0.85rem; 
            cursor: pointer;
        }

        .active { background: var(--btn-active) !important; color: white !important; }

        /* 語速與搜尋控制區 */
        .controls-panel {
            width: 100%;
            max-width: 480px;
            background: #252525;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #444;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .speed-control label { font-size: 0.9rem; color: var(--sub-text); min-width: 70px; }

        input[type=range] { flex: 1; accent-color: var(--btn-active); }

        #search-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #555;
            background: var(--search-bg);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        /* 卡片設計 */
        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 24px; 
            margin: 12px 0; 
            width: 100%; 
            max-width: 480px; 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .card-header {
            position: absolute;
            top: 10px;
            right: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .source-tag { font-size: 0.75rem; color: var(--btn-active); font-weight: bold; }

        .btn-star {
            background: transparent;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #555;
            padding: 0;
            line-height: 1;
        }

        .btn-star.favorited { color: var(--star-color); }

        .thai { 
            font-size: 2.05rem; 
            line-height: 1.4;
            margin-bottom: 8px; 
            font-weight: 700; 
            word-wrap: break-word;
            padding-right: 20px;
        }

        .chinese { font-size: 1.2rem; color: var(--sub-text); }

        .btn-speak { 
            border: none; background: transparent; color: var(--accent-color); 
            font-size: 2rem; cursor: pointer;
        }

        /* 外部連結資源 */
        .nav-btn {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #252525;
            color: #ccc;
            font-weight: 600;
            width: 100%;
            max-width: 480px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        /* 彈窗 Overlay */
        #link-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .link-content-box { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }

        .link-item {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--link-color);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .close-btn {
            margin-top: 20px;
            background: var(--danger-color);
            color: white;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            width: 100%;
        }

        #loading { margin-top: 50px; color: var(--sub-text); }
        #search-info { color: var(--sub-text); margin-bottom: 10px; font-size: 0.9rem; width: 100%; max-width: 480px; }
    </style>
</head>
<body>

    <div class="source-selector">
        <button id="btn-random" class="btn-main active" onclick="switchMode('random')">🎲全域隨機10句</button>
        <div class="grid-selector">
            <button class="source-btn" onclick="switchSource('custom', this)">網抓</button>
            <button class="source-btn" onclick="switchSource('thai2', this)">泰二</button>
            <button class="source-btn" onclick="switchSource('time', this)">時間</button>
            <button class="source-btn" onclick="switchSource('month', this)">月份</button>
            <button class="source-btn" onclick="switchSource('week', this)">星期</button>
            <button class="source-btn" onclick="switchSource('color', this)">顏色</button>
            <button class="source-btn" onclick="switchSource('ben', this)">Ben</button>
            <button class="source-btn" onclick="switchSource('self', this)">自建</button>
            <button id="btn-fav" class="source-btn" style="color: var(--star-color);" onclick="showFavorites(this)">⭐收藏</button>
        </div>
    </div>

    <button class="nav-btn" onclick="toggleLinkPage(true)">🔗外部連結</button>

    <div class="controls-panel">
        <div class="speed-control">
            <label>語速: <span id="speed-val">1.0</span>x</label>
            <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeed()">
        </div>
        <input type="search" id="search-input" placeholder="搜尋中文或泰文..." oninput="handleSearch()">
    </div>

    <div id="search-info"></div>
    <div id="loading">正在同步雲端資料...</div>
    <div id="app"></div>

    <div id="link-page">
        <h2 style="margin-bottom: 20px; color: white;">外部資源</h2>
        <div class="link-content-box">
            <a href="https://thai-alphabet.com/" target="_blank" class="link-item">thai-alphabet</a>
            <a href="https://www.thai2english.com/" target="_blank" class="link-item">thai2english</a>
            <button class="close-btn" onclick="toggleLinkPage(false)">關閉返回</button>
        </div>
    </div>

    <script>
        const base_url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv`;
        
        const gids = {
            custom: { name: "網抓", id: "538865502" },
            thai2: { name: "泰二", id: "2121125782" },
            time: { name: "時間", id: "1355116620" },
            month: { name: "月份", id: "1685596903" },
            week: { name: "星期", id: "1150463518" },
            color: { name: "顏色", id: "2103981449" },
            ben: { name: "Ben", id: "296346577" },
            self: { name: "自建", id: "134632937" }
        };

        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('thai_favs')) || [];
        let currentSpeed = 1.0;

        function updateSpeed() {
            currentSpeed = document.getElementById('speed-slider').value;
            document.getElementById('speed-val').innerText = parseFloat(currentSpeed).toFixed(1);
        }

        async function initAllData() {
            try {
                const fetchPromises = Object.keys(gids).map(async (key) => {
                    const response = await fetch(`${base_url}&gid=${gids[key].id}`);
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).slice(1);
                    return rows.map(row => {
                        const cols = row.split(',');
                        const thai = cols[0]?.trim();
                        const chinese = cols[1]?.trim();
                        // 產生唯一的 ID 用於收藏夾 (以泰文內容為鍵值)
                        return { id: btoa(unescape(encodeURIComponent(thai))), thai, chinese, source: gids[key].name };
                    }).filter(item => item.thai);
                });
                const results = await Promise.all(fetchPromises);
                allData = results.flat();
                document.getElementById('loading').style.display = 'none';
                displayRandom();
            } catch (e) {
                document.getElementById('loading').innerText = '資料同步失敗';
            }
        }

        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('thai_favs', JSON.stringify(favorites));
            
            // 重新渲染當前列表以更新星星顏色 (如果是從收藏分頁點擊，則移除該項)
            const activeBtn = document.querySelector('.source-btn.active');
            if (activeBtn && activeBtn.id === 'btn-fav') {
                showFavorites(activeBtn);
            } else {
                // 僅更新星星視覺效果
                document.querySelectorAll(`[data-id="${id}"]`).forEach(btn => {
                    btn.classList.toggle('favorited');
                });
            }
        }

        function showFavorites(btnElement) {
            clearActiveButtons();
            btnElement.classList.add('active');
            document.getElementById('search-input').value = '';
            const favItems = allData.filter(item => favorites.includes(item.id));
            renderList(favItems);
            document.getElementById('search-info').innerText = `收藏夾：共 ${favItems.length} 筆`;
        }

        function handleSearch() {
            const kw = document.getElementById('search-input').value.trim().toLowerCase();
            if (!kw) { displayRandom(); return; }
            const results = allData.filter(item => 
                item.thai.toLowerCase().includes(kw) || item.chinese.toLowerCase().includes(kw)
            );
            renderList(results);
            document.getElementById('search-info').innerText = `搜尋結果：${results.length} 筆`;
            clearActiveButtons();
        }

        function switchSource(key, btnElement) {
            clearActiveButtons();
            btnElement.classList.add('active');
            document.getElementById('search-input').value = '';
            const filtered = allData.filter(item => item.source === gids[key].name);
            renderList(filtered.sort(() => 0.5 - Math.random()).slice(0, 10));
            document.getElementById('search-info').innerText = `目前顯示：${gids[key].name}`;
        }

        function switchMode(mode) {
            clearActiveButtons();
            document.getElementById('btn-random').classList.add('active');
            document.getElementById('search-input').value = '';
            displayRandom();
        }

        function displayRandom() {
            const shuffled = [...allData].sort(() => 0.5 - Math.random()).slice(0, 10);
            renderList(shuffled);
            document.getElementById('search-info').innerText = '';
        }

        function renderList(list) {
            const container = document.getElementById('app');
            container.innerHTML = '';
            if (list.length === 0) {
                container.innerHTML = '<div style="margin-top:30px; color:#666;">目前沒有內容</div>';
                return;
            }
            list.forEach(item => {
                const isFav = favorites.includes(item.id);
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-header">
                        <span class="source-tag">${item.source}</span>
                        <button class="btn-star ${isFav ? 'favorited' : ''}" data-id="${item.id}" onclick="toggleFavorite('${item.id}')">★</button>
                    </div>
                    <div>
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'th-TH';
            msg.rate = currentSpeed;
            window.speechSynthesis.speak(msg);
        }

        function clearActiveButtons() {
            document.querySelectorAll('.source-btn, .btn-main').forEach(btn => btn.classList.remove('active'));
        }

        function toggleLinkPage(show) { document.getElementById('link-page').style.display = show ? 'flex' : 'none'; }

        initAllData();
    </script>
</body>
</html>
