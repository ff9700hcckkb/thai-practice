<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --accent-color: #e67e22;
            --btn-inactive: #3a3a3a;
            --btn-active: #3498db;
            --link-color: #2ecc71;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 10px 15px 50px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* 調整按鈕區：改用 flex 讓 7 個按鈕能自動換列 */
        .source-selector {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .source-btn {
            flex: 1 1 calc(33.33% - 8px); /* 預設一排三個 */
            min-width: 80px;
            padding: 12px 5px;
            border-radius: 10px;
            border: none;
            background: var(--btn-inactive);
            color: var(--sub-text);
            font-weight: 600;
            font-size: 0.95rem; 
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .source-btn.active {
            background: var(--btn-active);
            color: white;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .extra-controls {
            width: 100%;
            max-width: 450px;
            margin-bottom: 15px;
        }

        .nav-btn {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #555;
            background: #222;
            color: #ccc;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 18px; 
            padding: 22px 24px; 
            margin: 12px 0; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .content-area { flex: 1; text-align: left; padding-right: 8px; }

        .thai { 
            font-size: 2.05rem; 
            line-height: 1.4;
            margin-bottom: 6px; 
            font-weight: 700; 
            color: var(--text-color);
            word-wrap: break-word;
        }

        .chinese { font-size: 1.15rem; color: var(--sub-text); }

        button.btn-speak { 
            border: none; background: transparent; color: var(--accent-color); 
            font-size: 1.9rem; cursor: pointer; min-width: 55px;
        }

        #link-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .link-item {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            margin: 10px 0;
            border-radius: 15px;
            text-decoration: none;
            color: var(--link-color);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .close-btn {
            margin-top: 30px;
            background: #e74c3c;
            color: white;
            padding: 12px 40px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        #loading { margin-top: 50px; font-size: 1.1rem; color: var(--sub-text); }
    </style>
</head>
<body>

    <div class="source-selector">
        <button id="btn-custom" class="source-btn active" onclick="switchSource('custom')">自建</button>
        <button id="btn-thai2" class="source-btn" onclick="switchSource('thai2')">泰二</button>
        <button id="btn-time" class="source-btn" onclick="switchSource('time')">時間</button>
        <button id="btn-month" class="source-btn" onclick="switchSource('month')">月份</button>
        <button id="btn-week" class="source-btn" onclick="switchSource('week')">星期</button>
        <button id="btn-color" class="source-btn" onclick="switchSource('color')">顏色</button>
        <button id="btn-ben" class="source-btn" onclick="switchSource('ben')">Ben</button>
    </div>

    <div class="extra-controls">
        <button class="nav-btn" onclick="toggleLinkPage(true)">🔗 外部連結</button>
    </div>

    <div id="loading">載入練習中...</div>
    <div id="app"></div>

    <div id="link-page">
        <h2 style="margin-bottom: 30px;">外部工具資源</h2>
        <a href="https://thai-alphabet.com/" target="_blank" class="link-item">🇹🇭 thai-alphabet</a>
        <button class="close-btn" onclick="toggleLinkPage(false)">返回練習</button>
    </div>

    <script>
        const base_url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv`;
        
        // 更新後的 7 個分頁 GIDs
        const gids = {
            custom: "538865502",
            thai2: "2121125782",
            time: "1355116620",
            month: "1685596903",
            week: "1150463518",
            color: "2103981449",
            ben: "296346577"
        };

        let currentSourceKey = 'custom';
        let sentences = [];

        function toggleLinkPage(show) {
            document.getElementById('link-page').style.display = show ? 'flex' : 'none';
        }

        async function switchSource(key) {
            currentSourceKey = key;
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
            
            // 動態找出對應按鈕並設為 active
            const activeBtn = document.querySelector(`button[onclick*="'${key}'"]`);
            if (activeBtn) activeBtn.classList.add('active');

            document.getElementById('app').innerHTML = '';
            document.getElementById('loading').style.display = 'block';
            await fetchData();
        }

        async function fetchData() {
            try {
                const response = await fetch(`${base_url}&gid=${gids[currentSourceKey]}`);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                sentences = rows.map(row => {
                    const columns = row.split(',');
                    return { thai: columns[0], chinese: columns[1] };
                }).filter(s => s.thai && s.thai.trim() !== "");
                displayRandom();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = '載入失敗';
            }
        }

        function displayRandom() {
            window.scrollTo(0, 0);
            const container = document.getElementById('app');
            container.innerHTML = '';
            if (sentences.length === 0) return;
            const shuffled = [...sentences].sort(() => 0.5 - Math.random());
            shuffled.slice(0, 10).forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="content-area">
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        fetchData();
    </script>
</body>
</html>
