<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --accent-color: #e67e22;
            --btn-inactive: #3a3a3a;
            --btn-active: #3498db;
            --search-bg: #333;
            --link-color: #2ecc71;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 10px 15px 50px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .source-selector {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 10px 0;
            z-index: 100;
        }

        .source-btn {
            flex: 1 1 calc(25% - 8px);
            padding: 10px 5px;
            border-radius: 10px;
            border: none;
            background: var(--btn-inactive);
            color: var(--sub-text);
            font-weight: 600;
            font-size: 0.85rem; 
            cursor: pointer;
            text-align: center;
        }

        .source-btn.active {
            background: var(--btn-active);
            color: white;
        }

        .extra-controls {
            width: 100%;
            max-width: 450px;
            margin-bottom: 15px;
        }

        .nav-btn {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #555;
            background: #222;
            color: #ccc;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
        }

        .search-container {
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        #search-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #444;
            background: var(--search-bg);
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 18px; 
            padding: 22px 24px; 
            margin: 12px 0; 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
        }

        .source-tag {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 0.7rem;
            color: var(--btn-active);
            opacity: 0.7;
        }

        .thai { 
            font-size: 2.05rem; 
            line-height: 1.4;
            margin-bottom: 6px; 
            font-weight: 700; 
            color: var(--text-color);
            word-wrap: break-word;
        }

        .chinese { font-size: 1.15rem; color: var(--sub-text); }

        button.btn-speak { 
            border: none; background: transparent; color: var(--accent-color); 
            font-size: 1.9rem; cursor: pointer; min-width: 55px;
        }

        #link-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .link-item {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            margin: 10px 0;
            border-radius: 15px;
            text-decoration: none;
            color: var(--link-color);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .close-btn {
            margin-top: 30px;
            background: #e74c3c;
            color: white;
            padding: 12px 40px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        #loading { margin-top: 50px; font-size: 1.1rem; color: var(--sub-text); }
        #search-info { color: var(--sub-text); margin-bottom: 10px; font-size: 0.9rem; width: 100%; max-width: 450px; text-align: left; }
    </style>
</head>
<body>

    <div class="source-selector">
        <button class="source-btn active" onclick="switchMode('random')">隨機10句</button>
        <button class="source-btn" onclick="switchSource('custom')">網抓</button>
        <button class="source-btn" onclick="switchSource('thai2')">泰二</button>
        <button class="source-btn" onclick="switchSource('time')">時間</button>
        <button class="source-btn" onclick="switchSource('month')">月份</button>
        <button class="source-btn" onclick="switchSource('week')">星期</button>
        <button class="source-btn" onclick="switchSource('color')">顏色</button>
        <button class="source-btn" onclick="switchSource('ben')">Ben</button>
        <button class="source-btn" onclick="switchSource('self')">自建</button>
    </div>

    <div class="extra-controls">
        <button class="nav-btn" onclick="toggleLinkPage(true)">🔗 外部連結</button>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="輸入泰文或中文搜尋全部分頁..." oninput="handleSearch()">
    </div>

    <div id="search-info"></div>
    <div id="loading">正在同步所有分頁資料...</div>
    <div id="app"></div>

    <div id="link-page">
        <h2 style="margin-bottom: 30px;">外部資源</h2>
        <a href="https://thai-alphabet.com/" target="_blank" class="link-item">thai-alphabet</a>
        <a href="https://www.thai2english.com/" target="_blank" class="link-item">thai2english</a>
        <button class="close-btn" onclick="toggleLinkPage(false)">返回練習</button>
    </div>

    <script>
        const base_url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv`;
        
        const gids = {
            custom: { name: "網抓", id: "538865502" },
            thai2: { name: "泰二", id: "2121125782" },
            time: { name: "時間", id: "1355116620" },
            month: { name: "月份", id: "1685596903" },
            week: { name: "星期", id: "1150463518" },
            color: { name: "顏色", id: "2103981449" },
            ben: { name: "Ben", id: "296346577" },
            self: { name: "自建", id: "134632937" }
        };

        let allData = [];
        let isLoaded = false;

        function toggleLinkPage(show) {
            document.getElementById('link-page').style.display = show ? 'flex' : 'none';
        }

        async function initAllData() {
            try {
                const fetchPromises = Object.keys(gids).map(async (key) => {
                    const response = await fetch(`${base_url}&gid=${gids[key].id}`);
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).slice(1);
                    return rows.map(row => {
                        const cols = row.split(',');
                        return { 
                            thai: cols[0]?.trim(), 
                            chinese: cols[1]?.trim(), 
                            source: gids[key].name 
                        };
                    }).filter(item => item.thai);
                });

                const results = await Promise.all(fetchPromises);
                allData = results.flat();
                isLoaded = true;
                document.getElementById('loading').style.display = 'none';
                displayRandom();
            } catch (e) {
                document.getElementById('loading').innerText = '同步失敗，請重新整理';
            }
        }

        function handleSearch() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (!keyword) {
                displayRandom();
                document.getElementById('search-info').innerText = '';
                return;
            }
            const results = allData.filter(item => 
                (item.thai && item.thai.toLowerCase().includes(keyword)) || 
                (item.chinese && item.chinese.toLowerCase().includes(keyword))
            );
            renderList(results);
            document.getElementById('search-info').innerText = `搜尋結果：${results.length} 筆`;
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
        }

        function switchMode(mode) {
            document.getElementById('search-input').value = '';
            document.getElementById('search-info').innerText = '';
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            displayRandom();
        }

        function switchSource(key) {
            document.getElementById('search-input').value = '';
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const filtered = allData.filter(item => item.source === gids[key].name);
            renderList(filtered.sort(() => 0.5 - Math.random()).slice(0, 10));
            document.getElementById('search-info').innerText = `目前顯示：${gids[key].name} (隨機10句)`;
        }

        function displayRandom() {
            if (!isLoaded) return;
            const shuffled = [...allData].sort(() => 0.5 - Math.random()).slice(0, 10);
            renderList(shuffled);
        }

        function renderList(list) {
            const container = document.getElementById('app');
            container.innerHTML = '';
            if (list.length === 0) {
                container.innerHTML = '<div style="margin-top:20px; color:#b0b0b0;">找不到符合的內容</div>';
                return;
            }
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="source-tag">${item.source}</div>
                    <div class="content-area">
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        initAllData();
    </script>
</body>
</html>
