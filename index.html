<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語常用句</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --sub-text: #b0b0b0;
            --primary-btn: #3498db;
            --accent-color: #e67e22;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .header-controls {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 18px 20px; 
            margin: 10px 0; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            display: flex; /* 使用 flex 讓內容橫向排列 */
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .content-area {
            flex: 1; /* 佔據左側剩餘空間 */
            text-align: left; /* 改為靠左對齊，更有條理 */
            padding-right: 15px;
        }

        .thai { 
            font-size: 1.85rem; 
            line-height: 1.3;
            margin-bottom: 4px; 
            font-weight: bold; 
            color: var(--text-color);
            word-wrap: break-word;
        }

        .chinese { 
            font-size: 1.05rem; 
            color: var(--sub-text); 
        }

        button { 
            border: none; 
            cursor: pointer; 
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.6; }

        .btn-refresh { 
            background: var(--primary-btn); 
            color: white; 
            width: 100%; 
            max-width: 250px;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1rem;
        }

        /* 圓形小喇叭按鈕 */
        .btn-speak { 
            background: transparent; 
            color: var(--accent-color); 
            font-size: 1.8rem; /* 調整圖示大小 */
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
        }

        #loading { margin-top: 50px; font-weight: bold; color: var(--sub-text); }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="btn-refresh" onclick="displayRandom()">🔄 更新</button>
    </div>

    <div id="loading">載入句子中...</div>
    <div id="app"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv'; 
        let sentences = [];

        async function fetchData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                sentences = rows.map(row => {
                    const columns = row.split(',');
                    return { thai: columns[0], chinese: columns[1] };
                }).filter(s => s.thai && s.thai.trim() !== "");
                displayRandom();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = '讀取失敗，請確認網路連線';
            }
        }

        function displayRandom() {
            window.scrollTo(0, 0);
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            if (sentences.length === 0) return;

            const shuffled = [...sentences].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 5);

            selected.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="content-area">
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        fetchData();
    </script>
</body>
</html>
