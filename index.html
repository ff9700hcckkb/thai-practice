<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --sub-text: #7f8c8d;
            --primary-btn: #2980b9;
        }

        /* 深色模式變數 */
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --sub-text: #b0b0b0;
            --primary-btn: #3498db;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: 0.3s;
        }

        .header-controls {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 20px; 
            margin: 10px 0; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center; 
            transition: 0.3s;
        }

        .thai { font-size: 1.6rem; margin-bottom: 10px; font-weight: bold; color: var(--text-color); }
        .chinese { font-size: 1.1rem; color: var(--sub-text); margin-bottom: 15px; }

        button { 
            border: none; 
            padding: 12px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600;
        }

        .btn-refresh { background: var(--primary-btn); color: white; flex: 2; }
        .btn-theme { background: #9b59b6; color: white; flex: 1; }
        .btn-speak { background: #e67e22; color: white; width: 100%; margin-top: 5px; }

        #loading { margin-top: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="btn-refresh" onclick="displayRandom()">🔄 換一組練習</button>
        <button class="btn-theme" onclick="toggleTheme()">🌓 模式</button>
    </div>

    <div id="loading">載入句子中...</div>
    <div id="app"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv'; // 記得填入你的 CSV 網址
        let sentences = [];

        // 切換深色模式
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme); // 儲存偏好
        }

        // 載入儲存的模式
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        async function fetchData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                sentences = rows.map(row => {
                    const columns = row.split(',');
                    return { thai: columns[0], chinese: columns[1] };
                }).filter(s => s.thai && s.thai.trim() !== "");
                displayRandom();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = '讀取失敗，請檢查網路或網址';
            }
        }

        function displayRandom() {
            window.scrollTo(0, 0); // 重整時回到最上方
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            if (sentences.length === 0) return;

            const shuffled = [...sentences].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 5);

            selected.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="thai">${item.thai}</div>
                    <div class="chinese">${item.chinese}</div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊 播放發音</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.9; // 稍微放慢一點點，方便聽清楚
            window.speechSynthesis.speak(msg);
        }

        fetchData();
    </script>
</body>
</html>
