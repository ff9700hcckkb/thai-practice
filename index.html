<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --accent-color: #e67e22;
            --btn-inactive: #3a3a3a;
            --btn-active: #3498db;
            --search-bg: #333;
            --link-color: #2ecc71;
            --danger-color: #e74c3c;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 10px 15px 50px 15px; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        /* 頂部按鈕容器 - RWD 寬度適應 */
        .source-selector {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 10px 0;
            z-index: 100;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            background: var(--btn-inactive);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .grid-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .source-btn {
            padding: 12px 2px;
            border-radius: 10px;
            border: none;
            background: var(--btn-inactive);
            color: var(--sub-text);
            font-weight: 600;
            font-size: 0.85rem; 
            cursor: pointer;
        }

        .active {
            background: var(--btn-active) !important;
            color: white !important;
        }

        /* 控制項 */
        .extra-controls {
            width: 100%;
            max-width: 480px;
            margin-bottom: 15px;
        }

        .nav-btn {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #252525;
            color: #ccc;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }

        /* 搜尋框 RWD */
        .search-container {
            width: 100%;
            max-width: 480px;
            margin-bottom: 15px;
        }

        #search-input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 2px solid #444;
            background: var(--search-bg);
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }

        /* 卡片設計 */
        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 24px; 
            margin: 10px 0; 
            width: 100%; 
            max-width: 480px; 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .source-tag {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.75rem;
            color: var(--btn-active);
            font-weight: bold;
        }

        .thai { 
            font-size: 2.05rem; 
            line-height: 1.4;
            margin-bottom: 8px; 
            font-weight: 700; 
            word-wrap: break-word;
        }

        .chinese { font-size: 1.2rem; color: var(--sub-text); }

        .btn-speak { 
            border: none; background: transparent; color: var(--accent-color); 
            font-size: 2rem; cursor: pointer; padding-left: 10px;
        }

        /* === RWD 外部連結頁面優化 === */
        #link-page {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.95); /* 深色背景 */
            backdrop-filter: blur(8px); /* 磨砂玻璃效果 */
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .link-content-box {
            width: 100%;
            max-width: 350px; /* 限制寬度在手機正中央 */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--link-color);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border: 1px solid rgba(46, 204, 113, 0.2);
            transition: transform 0.1s;
        }

        .link-item:active { transform: scale(0.98); }

        .close-btn {
            margin-top: 20px;
            background: var(--danger-color);
            color: white;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        #loading { margin-top: 50px; font-size: 1.1rem; color: var(--sub-text); }
        #search-info { color: var(--sub-text); margin-bottom: 10px; font-size: 0.9rem; width: 100%; max-width: 480px; }
    </style>
</head>
<body>

    <div class="source-selector">
        <div class="mode-btn-container">
            <button id="btn-random" class="btn-main active" onclick="switchMode('random')">全域隨機10句</button>
        </div>
        <div class="grid-selector">
            <button class="source-btn" onclick="switchSource('custom', this)">網抓</button>
            <button class="source-btn" onclick="switchSource('thai2', this)">泰二</button>
            <button class="source-btn" onclick="switchSource('time', this)">時間</button>
            <button class="source-btn" onclick="switchSource('month', this)">月份</button>
            <button class="source-btn" onclick="switchSource('week', this)">星期</button>
            <button class="source-btn" onclick="switchSource('color', this)">顏色</button>
            <button class="source-btn" onclick="switchSource('ben', this)">Ben</button>
            <button class="source-btn" onclick="switchSource('self', this)">自建</button>
        </div>
    </div>

    <div class="extra-controls">
        <button class="nav-btn" onclick="toggleLinkPage(true)">🔗 外部連結資源</button>
    </div>

    <div class="search-container">
        <input type="search" id="search-input" placeholder="搜尋全部分頁..." oninput="handleSearch()">
    </div>

    <div id="search-info"></div>
    <div id="loading">正在同步資料...</div>
    <div id="app"></div>

    <div id="link-page">
        <h2 style="margin-bottom: 20px; color: white;">外部資源</h2>
        <div class="link-content-box">
            <a href="https://thai-alphabet.com/" target="_blank" class="link-item">thai-alphabet</a>
            <a href="https://www.thai2english.com/" target="_blank" class="link-item">thai2english</a>
            <button class="close-btn" onclick="toggleLinkPage(false)">關閉返回</button>
        </div>
    </div>

    <script>
        const base_url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv`;
        
        const gids = {
            custom: { name: "網抓", id: "538865502" },
            thai2: { name: "泰二", id: "2121125782" },
            time: { name: "時間", id: "1355116620" },
            month: { name: "月份", id: "1685596903" },
            week: { name: "星期", id: "1150463518" },
            color: { name: "顏色", id: "2103981449" },
            ben: { name: "Ben", id: "296346577" },
            self: { name: "自建", id: "134632937" }
        };

        let allData = [];
        let isLoaded = false;

        function toggleLinkPage(show) {
            document.getElementById('link-page').style.display = show ? 'flex' : 'none';
        }

        async function initAllData() {
            try {
                const fetchPromises = Object.keys(gids).map(async (key) => {
                    const response = await fetch(`${base_url}&gid=${gids[key].id}`);
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).slice(1);
                    return rows.map(row => {
                        const cols = row.split(',');
                        return { thai: cols[0]?.trim(), chinese: cols[1]?.trim(), source: gids[key].name };
                    }).filter(item => item.thai);
                });
                const results = await Promise.all(fetchPromises);
                allData = results.flat();
                isLoaded = true;
                document.getElementById('loading').style.display = 'none';
                displayRandom();
            } catch (e) {
                document.getElementById('loading').innerText = '讀取失敗，請重整';
            }
        }

        function handleSearch() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (!keyword) {
                displayRandom();
                document.getElementById('search-info').innerText = '';
                return;
            }
            const results = allData.filter(item => 
                (item.thai && item.thai.toLowerCase().includes(keyword)) || 
                (item.chinese && item.chinese.toLowerCase().includes(keyword))
            );
            renderList(results);
            document.getElementById('search-info').innerText = `搜尋結果：${results.length} 筆`;
            clearActiveButtons();
        }

        function clearActiveButtons() {
            document.querySelectorAll('.source-btn, .btn-main').forEach(btn => btn.classList.remove('active'));
        }

        function switchMode(mode) {
            document.getElementById('search-input').value = '';
            document.getElementById('search-info').innerText = '';
            clearActiveButtons();
            document.getElementById('btn-random').classList.add('active');
            displayRandom();
        }

        function switchSource(key, btnElement) {
            document.getElementById('search-input').value = '';
            clearActiveButtons();
            btnElement.classList.add('active');
            const filtered = allData.filter(item => item.source === gids[key].name);
            renderList(filtered.sort(() => 0.5 - Math.random()).slice(0, 10));
            document.getElementById('search-info').innerText = `目前顯示：${gids[key].name} (隨機10句)`;
        }

        function displayRandom() {
            if (!isLoaded) return;
            const shuffled = [...allData].sort(() => 0.5 - Math.random()).slice(0, 10);
            renderList(shuffled);
        }

        function renderList(list) {
            const container = document.getElementById('app');
            container.innerHTML = '';
            if (list.length === 0) {
                container.innerHTML = '<div style="margin-top:30px; color:#b0b0b0;">無搜尋結果</div>';
                return;
            }
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="source-tag">${item.source}</div>
                    <div>
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        initAllData();
    </script>
</body>
</html>
