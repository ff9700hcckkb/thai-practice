<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練 - 全域搜尋版</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --accent-color: #e67e22;
            --btn-inactive: #3a3a3a;
            --btn-active: #3498db;
            --search-bg: #333;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 10px 15px 50px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* 頂部按鈕區 */
        .source-selector {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 10px 0;
            z-index: 100;
        }

        .source-btn {
            flex: 1 1 calc(25% - 8px);
            padding: 10px 5px;
            border-radius: 10px;
            border: none;
            background: var(--btn-inactive);
            color: var(--sub-text);
            font-weight: 600;
            font-size: 0.85rem; 
            cursor: pointer;
            text-align: center;
        }

        .source-btn.active {
            background: var(--btn-active);
            color: white;
        }

        /* 搜尋框樣式 */
        .search-container {
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        #search-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #444;
            background: var(--search-bg);
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
        }

        #search-input:focus {
            border-color: var(--btn-active);
        }

        /* 卡片樣式 */
        .card { 
            background: var(--card-bg); 
            border-radius: 18px; 
            padding: 22px 24px; 
            margin: 12px 0; 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
        }

        /* 顯示來源標籤 */
        .source-tag {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 0.7rem;
            color: var(--btn-active);
            opacity: 0.7;
        }

        .content-area { flex: 1; text-align: left; padding-right: 8px; }

        .thai { 
            font-size: 2.05rem; 
            line-height: 1.4;
            margin-bottom: 6px; 
            font-weight: 700; 
            color: var(--text-color);
            word-wrap: break-word;
        }

        .chinese { font-size: 1.15rem; color: var(--sub-text); }

        button.btn-speak { 
            border: none; background: transparent; color: var(--accent-color); 
            font-size: 1.9rem; cursor: pointer; min-width: 55px;
        }

        #loading { margin-top: 50px; font-size: 1.1rem; color: var(--sub-text); }
        #search-info { color: var(--sub-text); margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="source-selector">
        <button class="source-btn active" onclick="switchMode('random')">隨機10句</button>
        <button id="btn-custom" class="source-btn" onclick="switchSource('custom')">自建</button>
        <button id="btn-thai2" class="source-btn" onclick="switchSource('thai2')">泰二</button>
        <button id="btn-time" class="source-btn" onclick="switchSource('time')">時間</button>
        <button id="btn-month" class="source-btn" onclick="switchSource('month')">月份</button>
        <button id="btn-week" class="source-btn" onclick="switchSource('week')">星期</button>
        <button id="btn-color" class="source-btn" onclick="switchSource('color')">顏色</button>
        <button id="btn-ben" class="source-btn" onclick="switchSource('ben')">Ben</button>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="輸入泰文或中文搜尋全部分頁..." oninput="handleSearch()">
    </div>

    <div id="search-info"></div>
    <div id="loading">正在同步所有分頁資料...</div>
    <div id="app"></div>

    <script>
        const base_url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv`;
        const gids = {
            custom: { name: "自建", id: "538865502" },
            thai2: { name: "泰二", id: "2121125782" },
            time: { name: "時間", id: "1355116620" },
            month: { name: "月份", id: "1685596903" },
            week: { name: "星期", id: "1150463518" },
            color: { name: "顏色", id: "2103981449" },
            ben: { name: "Ben", id: "296346577" }
        };

        let allData = []; // 儲存所有分頁彙整後的資料
        let isLoaded = false;

        // 初始化：一次抓取所有資料
        async function initAllData() {
            try {
                const fetchPromises = Object.keys(gids).map(async (key) => {
                    const response = await fetch(`${base_url}&gid=${gids[key].id}`);
                    const csvText = await response.text();
                    const rows = csvText.split('\n').slice(1);
                    return rows.map(row => {
                        const cols = row.split(',');
                        return { 
                            thai: cols[0]?.trim(), 
                            chinese: cols[1]?.trim(), 
                            source: gids[key].name 
                        };
                    }).filter(item => item.thai);
                });

                const results = await Promise.all(fetchPromises);
                allData = results.flat();
                isLoaded = true;
                document.getElementById('loading').style.display = 'none';
                displayRandom(); // 預設顯示隨機
            } catch (e) {
                document.getElementById('loading').innerText = '同步失敗，請重新整理';
            }
        }

        // 切換模式（隨機或特定分頁）
        function switchMode(mode) {
            document.getElementById('search-input').value = '';
            document.getElementById('search-info').innerText = '';
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            displayRandom();
        }

        function switchSource(key) {
            document.getElementById('search-input').value = '';
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const filtered = allData.filter(item => item.source === gids[key].name);
            renderList(filtered.sort(() => 0.5 - Math.random()).slice(0, 10));
            document.getElementById('search-info').innerText = `目前顯示：${gids[key].name} (隨機10句)`;
        }

        // 搜尋邏輯
        function handleSearch() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (!keyword) {
                displayRandom();
                document.getElementById('search-info').innerText = '';
                return;
            }

            const results = allData.filter(item => 
                item.thai.toLowerCase().includes(keyword) || 
                item.chinese.toLowerCase().includes(keyword)
            );

            renderList(results);
            document.getElementById('search-info').innerText = `搜尋結果：${results.length} 筆`;
            document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
        }

        function displayRandom() {
            if (!isLoaded) return;
            const shuffled = [...allData].sort(() => 0.5 - Math.random()).slice(0, 10);
            renderList(shuffled);
        }

        function renderList(list) {
            const container = document.getElementById('app');
            container.innerHTML = '';
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="source-tag">${item.source}</div>
                    <div class="content-area">
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        initAllData();
    </script>
</body>
</html>
