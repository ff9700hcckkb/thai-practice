<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語常用句型</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --accent-color: #e67e22;
            --btn-inactive: #3a3a3a;
            --btn-active: #3498db;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color);
            padding: 10px 15px 50px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* 3個資料來源切換按鈕區 */
        .source-selector {
            width: 100%;
            max-width: 450px;
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .source-btn {
            flex: 1;
            padding: 10px 5px;
            border-radius: 10px;
            border: none;
            background: var(--btn-inactive);
            color: var(--sub-text);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .source-btn.active {
            background: var(--btn-active);
            color: white;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 18px; 
            padding: 20px 22px; 
            margin: 10px 0; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .content-area {
            flex: 1; 
            text-align: left; 
            padding-right: 8px;
        }

        .thai { 
            font-size: 2.05rem; 
            line-height: 1.4;
            margin-bottom: 6px; 
            font-weight: 700; 
            color: var(--text-color);
            word-wrap: break-word;
        }

        .chinese { 
            font-size: 1.1rem; 
            color: var(--sub-text); 
        }

        button.btn-speak { 
            border: none;
            background: transparent;
            color: var(--accent-color); 
            font-size: 1.9rem; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 55px;
            transition: transform 0.1s;
        }

        button.btn-speak:active { 
            opacity: 0.4; 
            transform: scale(1.2); 
        }

        #loading { margin-top: 100px; font-size: 1.1rem; color: var(--sub-text); }
    </style>
</head>
<body>

    <div class="source-selector">
        <button id="btn-custom" class="source-btn active" onclick="switchSource('custom')">自建</button>
        <button id="btn-thai100" class="source-btn" onclick="switchSource('thai100')">泰二</button>
        <button id="btn-time" class="source-btn" onclick="switchSource('time')">時間</button>
    </div>

    <div id="loading">載入練習中...</div>
    <div id="app"></div>

    <script>
        const sources = {
            custom: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv",
            thai100: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjm7j2vq2047v5aLY3tNBU_va83hqS9u6_skG35lTdtVxK4nCNC7qRoePHg_FsbdxvjbkR0s-JxmNt/pub?output=csv",
            time: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3bHaY_7eyJ7RBHZl22Gr-y7gH6Is3oCL6CKS5x4qQpAopl4i2bsS2Xk6N7xgUK3n5o5A1_xUd9ab-/pub?output=csv"
        };

        let currentSourceKey = 'custom';
        let sentences = [];

        async function switchSource(key) {
            currentSourceKey = key;
            
            // 更新按鈕樣式
            document.getElementById('btn-custom').classList.toggle('active', key === 'custom');
            document.getElementById('btn-thai100').classList.toggle('active', key === 'thai100');
            document.getElementById('btn-time').classList.toggle('active', key === 'time');
            
            document.getElementById('app').innerHTML = '';
            document.getElementById('loading').style.display = 'block';
            
            await fetchData();
        }

        async function fetchData() {
            try {
                const response = await fetch(sources[currentSourceKey]);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                sentences = rows.map(row => {
                    const columns = row.split(',');
                    return { thai: columns[0], chinese: columns[1] };
                }).filter(s => s.thai && s.thai.trim() !== "");
                
                displayRandom();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = '載入失敗';
            }
        }

        function displayRandom() {
            window.scrollTo(0, 0);
            const container = document.getElementById('app');
            container.innerHTML = '';
            
            if (sentences.length === 0) return;

            const shuffled = [...sentences].sort(() => 0.5 - Math.random());
            // 修改為顯示 10 句
            const selected = shuffled.slice(0, 10);

            selected.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="content-area">
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'th-TH';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }

        fetchData();
    </script>
</body>
</html>
