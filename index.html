<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰語隨身練</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --sub-text: #b0b0b0;
            --btn-inactive: #3a3a3a;
            --search-bg: #333;
            --search-border: #444;
            --nav-bg: #252525;
            --accent-color: #e67e22;
            --btn-active: #3498db;
            --link-color: #2ecc71;
            --danger-color: #e74c3c;
            --star-color: #f1c40f;
            --thai-size: 32px;
            --zh-size: 19.2px;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --sub-text: #7f8c8d;
            --btn-inactive: #e0e0e0;
            --search-bg: #ffffff;
            --search-border: #bdc3c7;
            --nav-bg: #ecf0f1;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); color: var(--text-color);
            padding: 10px 15px 60px 15px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; transition: background 0.3s, color 0.3s;
        }

        /* 頂部導航按鈕區 */
        .top-nav {
            width: 100%; max-width: 480px; display: grid;
            grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px;
        }
        .nav-small-btn {
            padding: 10px; border-radius: 10px; border: 1px solid var(--search-border);
            background: var(--nav-bg); color: var(--sub-text); font-size: 0.85rem;
            font-weight: 600; cursor: pointer;
        }

        /* 來源選擇區 */
        .source-selector {
            width: 100%; max-width: 480px; display: flex; flex-direction: column;
            gap: 8px; margin-bottom: 10px; position: sticky; top: 0;
            background: var(--bg-color); padding: 10px 0; z-index: 100;
        }

        .btn-main {
            width: 100%; padding: 14px; font-size: 1.05rem;
            background: var(--btn-inactive); color: var(--text-color);
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        .grid-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .source-btn {
            padding: 12px 2px; border-radius: 10px; border: none;
            background: var(--btn-inactive); color: var(--sub-text);
            font-weight: 600; font-size: 0.85rem; cursor: pointer;
        }

        .active { background: var(--btn-active) !important; color: white !important; }

        /* 搜尋與卡片 */
        .search-container { width: 100%; max-width: 480px; margin-bottom: 15px; }
        #search-input {
            width: 100%; padding: 16px; border-radius: 14px;
            border: 2px solid var(--search-border); background: var(--search-bg);
            color: var(--text-color); font-size: 1.1rem; box-sizing: border-box; outline: none;
        }

        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 24px; margin: 12px 0; 
            width: 100%; max-width: 480px; display: flex; align-items: center;
            justify-content: space-between; box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .card-header { position: absolute; top: 10px; right: 15px; display: flex; gap: 10px; align-items: center; }
        .source-tag { font-size: 0.75rem; color: var(--btn-active); font-weight: bold; }
        .btn-star { background: transparent; border: none; font-size: 1.3rem; cursor: pointer; color: #999; }
        .btn-star.favorited { color: var(--star-color); }

        .thai { font-size: var(--thai-size); line-height: 1.4; margin-bottom: 8px; font-weight: 700; word-wrap: break-word; padding-right: 25px; }
        .chinese { font-size: var(--zh-size); color: var(--sub-text); }
        .btn-speak { border: none; background: transparent; color: var(--accent-color); font-size: 2.2rem; cursor: pointer; }

        /* 彈窗樣式 (通用) */
        .modal-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }
        .modal-content { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; }
        .setting-group { background: var(--card-bg); padding: 15px 20px; border-radius: 15px; border: 1px solid var(--search-border); }
        .setting-label { display: block; margin-bottom: 12px; font-weight: bold; color: var(--sub-text); font-size: 0.85rem; }
        .control-box { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .theme-switch-btn { background: var(--btn-active); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        input[type=range] { flex: 1; accent-color: var(--btn-active); }
        .link-item { background: var(--card-bg); padding: 15px; border-radius: 15px; text-decoration: none; color: var(--link-color); font-size: 1rem; font-weight: bold; text-align: center; border: 1px solid var(--search-border); }
        .close-btn { margin-top: 10px; background: var(--danger-color); color: white; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; width: 100%; }
        
        #loading { margin-top: 50px; color: var(--sub-text); }
        #search-info { color: var(--sub-text); margin-bottom: 10px; font-size: 0.9rem; width: 100%; max-width: 480px; }
        ul { padding-left: 20px; margin: 0; color: var(--sub-text); line-height: 1.8; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-small-btn" onclick="openModal('info-page')">💡 使用說明</button>
        <button class="nav-small-btn" onclick="openModal('settings-page')">⚙️ 偏好設定</button>
        <button class="nav-small-btn" onclick="openModal('links-page')">🔗 外部資源</button>
    </div>

    <div class="source-selector">
        <button id="btn-random" class="btn-main active" onclick="switchMode('random')">全域隨機10句</button>
        <div class="grid-selector">
    <button class="source-btn" onclick="switchSource('custom', this)">網抓</button>
    <button class="source-btn" onclick="switchSource('thai2', this)">泰二</button>
    <button class="source-btn" onclick="switchSource('time', this)">時間</button>
    <button class="source-btn" onclick="switchSource('month', this)">月份</button>
    <button class="source-btn" onclick="switchSource('week', this)">星期</button>
    <button class="source-btn" onclick="switchSource('color', this)">顏色</button>
    <button class="source-btn" onclick="switchSource('ben', this)">Ben</button>
    <button class="source-btn" onclick="switchSource('lyrics', this)">歌詞</button>
    <button class="source-btn" onclick="switchSource('self', this)">自建</button>
</div>
        <button id="btn-fav" class="source-btn" style="width:100%; margin-top:8px; color:var(--star-color);" onclick="showFavorites(this)">⭐ 已加星號</button>
    </div>

    <div class="search-container">
        <input type="search" id="search-input" placeholder="輸入泰文或中文搜尋....." oninput="handleSearch()">
    </div>

    <div id="search-info"></div>
    <div id="loading">正在同步雲端資料...</div>
    <div id="app"></div>

    <div id="info-page" class="modal-page">
        <div class="modal-content">
            <h2 style="text-align: center;">💡 使用說明</h2>
            <div class="setting-group" style="background: rgba(255, 88, 9, 0.05); border-color: rgba(255, 88, 9, 0.2);">
                <ul style="font-size: 1rem;">
                    <li>點選上方來源可切換題庫，隨機顯示10句</li>
                    <li>隨機顯示的句子不會包含歌詞頁面的內容</li>
                    <li>點右上角星號可將該句加入收藏</li>
                    <li>利用搜尋框可輸入泰文、中文查找全表內容</li>
                    <li>偏好設定內可自訂語速與字體大小</li>
                    <li>題庫為自行搜集，AI協助整理，有誤請告知。</li>
                </ul>
            </div>
            <button class="close-btn" onclick="closeModal('info-page')">返回</button>
        </div>
    </div>

    <div id="settings-page" class="modal-page">
        <div class="modal-content">
            <h2 style="text-align: center;">⚙️ 偏好設定</h2>
            <div class="setting-group">
                <span class="setting-label">🌓 介面主題</span>
                <button id="theme-toggle" class="theme-switch-btn" onclick="toggleTheme()">切換模式</button>
            </div>
            <div class="setting-group">
                <span class="setting-label">🔊 發音語速 (<span id="speed-val">1.0</span>)</span>
                <div class="control-box">
                    <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeed(this.value)">
                </div>
            </div>
            <div class="setting-group">
                <span class="setting-label">🔤 字體大小 (<span id="font-val">32</span>px)</span>
                <div class="control-box">
                    <input type="range" id="font-slider" min="20" max="48" step="1" value="32" oninput="updateFontSize(this.value)">
                </div>
            </div>
            <button class="close-btn" onclick="closeModal('settings-page')">儲存並關閉</button>
        </div>
    </div>

    <div id="links-page" class="modal-page">
        <div class="modal-content">
            <h2 style="text-align: center;">🔗 外部資源</h2>
            <a href="https://thai-alphabet.com/" target="_blank" class="link-item">Thai Alphabet (字母學習)</a>
            <a href="https://www.thai2english.com/" target="_blank" class="link-item">Thai2English (線上字典)</a>
            <button class="close-btn" onclick="closeModal('links-page')">返回</button>
        </div>
    </div>

    <script>
        const base_url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRuB_ZzZBKNqiEJW_7pXVNJFyjnORS8bBz24b65lJ4zMfAlrNsEDEyhi2VW-nzC5K8_2gNsbnH7ITFu/pub?output=csv`;
        const gids = { 
            custom: { name: "網抓", id: "538865502" }, 
            thai2: { name: "泰二", id: "2121125782" }, 
            lyrics: { name: "歌詞", id: "1404447959" },
            time: { name: "時間", id: "1355116620" }, 
            month: { name: "月份", id: "1685596903" }, 
            week: { name: "星期", id: "1150463518" }, 
            color: { name: "顏色", id: "2103981449" }, 
            ben: { name: "Ben", id: "296346577" }, 
            self: { name: "自建", id: "134632937" } 
        };

        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('thai_favs')) || [];
        
        // --- 彈窗控制 ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- 設定記憶 ---
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('thai_theme', theme);
            document.getElementById('theme-toggle').innerText = theme === 'light' ? '切換至深色模式' : '切換至淺色模式';
        }
        setTheme(localStorage.getItem('thai_theme') || 'dark');

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'light' ? 'dark' : 'light');
        }

        let currentSpeed = parseFloat(localStorage.getItem('thai_speed')) || 1.0;
        function updateSpeed(val) {
            currentSpeed = parseFloat(val);
            document.getElementById('speed-val').innerText = currentSpeed.toFixed(1);
            localStorage.setItem('thai_speed', currentSpeed);
        }
        document.getElementById('speed-slider').value = currentSpeed;
        document.getElementById('speed-val').innerText = currentSpeed.toFixed(1);

        function updateFontSize(val, store = true) {
            document.getElementById('font-val').innerText = val;
            document.documentElement.style.setProperty('--thai-size', val + 'px');
            document.documentElement.style.setProperty('--zh-size', (val * 0.6) + 'px');
            if(store) localStorage.setItem('thai_font_size', val);
        }
        const savedSize = localStorage.getItem('thai_font_size') || 32;
        updateFontSize(savedSize, false);
        document.getElementById('font-slider').value = savedSize;

        // --- 資料處理 ---
        async function initAllData() {
            try {
                const fetchPromises = Object.keys(gids).map(async (key) => {
                    const response = await fetch(`${base_url}&gid=${gids[key].id}`);
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).slice(1);
                    return rows.map(row => {
                        const cols = row.split(',');
                        const thai = cols[0]?.trim();
                        return { id: btoa(unescape(encodeURIComponent(thai))), thai, chinese: cols[1]?.trim(), source: gids[key].name };
                    }).filter(item => item.thai);
                });
                const results = await Promise.all(fetchPromises);
                allData = results.flat();
                document.getElementById('loading').style.display = 'none';
                displayRandom();
            } catch (e) { document.getElementById('loading').innerText = '資料同步失敗'; }
        }

        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index > -1) favorites.splice(index, 1); else favorites.push(id);
            localStorage.setItem('thai_favs', JSON.stringify(favorites));
            document.querySelectorAll(`[data-id="${id}"]`).forEach(btn => btn.classList.toggle('favorited'));
        }

        function showFavorites(btnElement) {
            clearActiveButtons();
            btnElement.classList.add('active');
            const favItems = allData.filter(item => favorites.includes(item.id));
            renderList(favItems);
            document.getElementById('search-info').innerText = `收藏夾：共 ${favItems.length} 筆`;
        }

        function handleSearch() {
            const kw = document.getElementById('search-input').value.trim().toLowerCase();
            if (!kw) { displayRandom(); return; }
            const results = allData.filter(item => item.thai.toLowerCase().includes(kw) || item.chinese.toLowerCase().includes(kw));
            renderList(results);
            document.getElementById('search-info').innerText = `搜尋結果：${results.length} 筆`;
            clearActiveButtons();
        }

        function switchSource(key, btnElement) {
            clearActiveButtons();
            btnElement.classList.add('active');
            const filtered = allData.filter(item => item.source === gids[key].name);
            renderList(filtered.sort(() => 0.5 - Math.random()).slice(0, 10));
            document.getElementById('search-info').innerText = `目前顯示：${gids[key].name}`;
        }

        function switchMode(mode) {
            clearActiveButtons();
            document.getElementById('btn-random').classList.add('active');
            displayRandom();
        }

        function displayRandom() {
            // 排除來源為「歌詞」的資料後再進行隨機抽樣
            const filteredData = allData.filter(item => item.source !== "歌詞");
            const shuffled = [...filteredData].sort(() => 0.5 - Math.random()).slice(0, 10);
            
            renderList(shuffled);
            document.getElementById('search-info').innerText = '';
        }

        function renderList(list) {
            const container = document.getElementById('app');
            container.innerHTML = list.length === 0 ? '<div style="margin-top:30px; color:#666;">無內容</div>' : '';
            list.forEach(item => {
                const isFav = favorites.includes(item.id);
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-header">
                        <span class="source-tag">${item.source}</span>
                        <button class="btn-star ${isFav ? 'favorited' : ''}" data-id="${item.id}" onclick="toggleFavorite('${item.id}')">★</button>
                    </div>
                    <div>
                        <div class="thai">${item.thai}</div>
                        <div class="chinese">${item.chinese}</div>
                    </div>
                    <button class="btn-speak" onclick="speak('${item.thai}')">🔊</button>
                `;
                container.appendChild(div);
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'th-TH';
            msg.rate = currentSpeed;
            window.speechSynthesis.speak(msg);
        }

        function clearActiveButtons() {
            document.querySelectorAll('.source-btn, .btn-main, #btn-fav').forEach(btn => btn.classList.remove('active'));
        }

        initAllData();
    </script>
</body>
</html>
