/* 統一所有控制按鈕的基礎樣式 */
.quiz-toggle, .refresh-btn {

</head>

function checkPasscode() {
    const input = document.getElementById('passcode').value;
    // 將所有允許的密碼 Base64 放在陣列中
    const authorizedPass = [
        'NTgzNDU4MzRhYUFB', 
        'MTIzNDQzMjE='   
    ];

    // 檢查輸入的編碼是否符合陣列中的任何一組
    if (authorizedPass.includes(btoa(input))) {
        document.getElementById('login-overlay').style.display = 'none';
        localStorage.setItem('thai_auth', 'true');
        localStorage.setItem('auth_time', new Date().getTime());
    } else {
        const errorMsg = document.getElementById('error-msg');
        errorMsg.style.display = 'block';
        document.getElementById('passcode').value = '';
    }
}

// 頁面載入時的總初始化
window.addEventListener('load', () => {
    // 1. 執行密碼檢查
    const isAuth = localStorage.getItem('thai_auth');
    const authTime = localStorage.getItem('auth_time');
    const now = new Date().getTime();
    
    if (isAuth === 'true' && (now - authTime < 86400000)) {
        document.getElementById('login-overlay').style.display = 'none';
    }

    // 2. 啟動資料抓取
    initAllData();
});
        
let isArtFont = false;

function toggleArtFont() {
    isArtFont = !isArtFont;
    const btn = document.getElementById('art-font-btn');
    
    // 1. 切換按鈕顏色
    btn.classList.toggle('art-active');
    
    // 2. 針對目前畫面上所有的卡片切換字體
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        card.classList.toggle('art-font');
    });
    
    // 3. 提示目前狀態
    document.getElementById('search-info').innerText = isArtFont ? '已切換為藝術字體' : '已恢復標準字體';
}
        
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const isOpen = sb.classList.contains('open');
            sb.classList.toggle('open');
            ov.style.display = isOpen ? 'none' : 'block';
        }
      function openModal(id) {
    if (id === 'about-page') {
        renderAboutContent(); // 打開時動態產生內容
    }
    document.getElementById(id).style.display = 'flex';
    if(window.innerWidth < 600) toggleSidebar();

        function renderAboutContent() {
    const container = document.querySelector('#about-page .modal-content');
    let html = `<h2 style="text-align:center">ℹ️ 關於本站</h2>`;
    
    // 從 aboutData 產生區塊
    aboutData.forEach(item => {
        html += `
            <div class="setting-group">
                <span class="sidebar-label">${item.title}</span>
                <p class="info-text">${item.content}</p>
            </div>
        `;
    });

    // 保留底部的統計資訊與關閉按鈕
    html += `
        <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--sub-text); font-size: 0.85rem; color: var(--sub-text); line-height: 1.8;">
            <div id="stat-total-count">詞庫總筆數：<strong style="color:var(--btn-active)">${allData.length}</strong> 筆</div>
            <div id="stat-last-update">最後更新時間：${new Date().toLocaleDateString()}</div>
        </div>
        <button class="close-btn" onclick="closeModal('about-page')">返回</button>
    `;
    
    container.innerHTML = html;
}
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('thai_theme', theme);
            const btn = document.getElementById('theme-toggle');
            if(btn) btn.innerText = theme === 'light' ? '切換至深色模式' : '切換至淺色模式';
        }
        setTheme(localStorage.getItem('thai_theme') || 'dark');

async function initAllData() {
    try {
        // 1. 準備抓取詞庫的 Promises
        const fetchPromises = Object.keys(gids).map(async (key) => {
            const response = await fetch(`${base_url}&gid=${gids[key].id}&t=${Date.now()}`);
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/).slice(1);
            return rows.map(row => {
                const cols = row.split(',');
                let t = (cols.length > 2 ? cols[1] : cols[0])?.trim();
                let c = (cols.length > 2 ? cols[2] : cols[1])?.trim();
                return { id: btoa(unescape(encodeURIComponent(t))), thai: t, chinese: c, source: gids[key].name };
            }).filter(item => item.thai);
        });

        // 2. 準備抓取「關於本站」的 Promise
        const fetchAboutPromise = (async () => {
            const response = await fetch(`${base_url}&gid=${ABOUT_GID}&t=${Date.now()}`);
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/).slice(1);
            return rows.map(row => {
                const cols = row.split(',');
                // 假設：第一欄是標題(title)，第二欄是內容(content)
                return { 
                    title: cols[0]?.trim(), 
                    content: cols[1]?.trim() ? cols[1].trim().replace(/\\n/g, '<br>') : "" 
                };
            }).filter(item => item.title);
        })();

        // 3. 同時啟動所有抓取任務
        const [詞庫結果, 關於結果] = await Promise.all([
            Promise.all(fetchPromises),
            fetchAboutPromise
        ]);

        // 4. 分配資料
        allData = 詞庫結果.flat();
        aboutData = 關於結果;

        // 5. 隱藏載入中並初始化頁面
        document.getElementById('loading').style.display = 'none';
        displayRandom();
        refreshSiteStats();
        initExternalLinks(); 
        
    } catch (e) { 
        console.error(e);
        document.getElementById('loading').innerText = '資料同步失敗'; 
    }
}

function convertNumbersToThaiText(text) {
    if (!text) return "";

    // 檢查字串中是否包含任何 阿拉伯數字 (0-9) 或 泰文數字 (๐-๙)
    // 如果完全沒有數字，直接回傳原始文字，不做任何處理，確保泰文編碼完整
    if (!/[0-9๐-๙]/.test(text)) {
        return text;
    }

    const thaiNumbers = ['ศูนย์', 'หนึ่ง', 'สอง', 'สาม', 'สี่', 'ห้า', 'หก', 'เจ็ด', 'แปด', 'เก้า'];
    const units = ['', 'สิบ', 'ร้อย', 'พัน', 'หมื่น', 'แสน', 'ล้าน'];

    // 先處理泰文數字轉阿拉伯數字
    let processed = text.replace(/[๐-๙]/g, d => "๐๑๒๓๔๕๖๗๘๙".indexOf(d));

    // 執行數字轉泰文文字
    return processed.replace(/\d+/g, (match) => {
        let n = parseInt(match);
        if (n === 0) return thaiNumbers[0];
        
        let str = '';
        let numStr = match;
        let len = numStr.length;

        for (let i = 0; i < len; i++) {
            let digit = parseInt(numStr[i]);
            let position = (len - i - 1) % 6;
            
            if (digit !== 0) {
                if (position === 0 && digit === 1 && len > 1) {
                    str += 'เอ็ด';
                } else if (position === 1 && digit === 2) {
                    str += 'ยี่สิบ';
                } else if (position === 1 && digit === 1) {
                    str += 'สิบ';
                } else {
                    str += thaiNumbers[digit] + units[position];
                }
            }
            if (i < len - 1 && (len - i - 1) % 6 === 0) {
                str += 'ล้าน';
            }
        }
        return str;
    });
}

function speak(text, btnElement, e) {
    if(e) e.stopPropagation();
    window.speechSynthesis.cancel();

    let processedText = text.normalize('NFC').trim();
    // 1. 先修正底層編碼 (把拆散的零件組裝好)
    processedText = processedText.replace(/\u0e4d\u0e32/g, "\u0e33");

    // 2. 再針對特定詞彙做音譯攔截 (確保數量這個詞發音正確)
    processedText = processedText.replace(/จำนวน/g, "จัม-นวน");
    
    processedText = convertNumbersToThaiText(processedText);

    // 【核心修復】針對所有編碼組合的 Nam (น้ำ) 進行攔截
    // 這裡處理各種可能的 Unicode 組合排序
    processedText = processedText.replace(/น[\u0e33\u0e4d\u0e32\u0e49]{2,3}/g, "นั้ม");

    // 通用 Am 音 (ำ) 的深度修復
    processedText = processedText.replace(/([ก-๙])([\u0e48-\u0e4b])?([\u0e33\u0e4d])(\u0e32?)/g, (match, con, tone, am, a) => {
        let finalTone = tone ? tone : "";
        return con + "ั" + finalTone + "ม";
    });

    processedText = processedText.replace(/([ก-๙]{1,6})ๆ/gu, '$1, $1');

    const msg = new SpeechSynthesisUtterance(processedText);
    const voices = window.speechSynthesis.getVoices();
    const bestVoice = voices.find(v => v.lang.includes('th') && (v.name.includes('Siri') || v.name.includes('Enhanced')))
                    || voices.find(v => v.lang.includes('th'));

    if (bestVoice) msg.voice = bestVoice;
    msg.lang = 'th-TH';
    msg.rate = 1.0; 

    if (btnElement) btnElement.classList.add('playing');
    msg.onend = () => { if (btnElement) btnElement.classList.remove('playing'); };
    
    window.speechSynthesis.speak(msg);
}

        'MTIzNDQzMjE='      // 12344321
    ];

    // 改成用 .includes 檢查「輸入的密碼轉碼後」是否在陣列名單中
    if (authorizedPass.includes(btoa(input))) {
        document.getElementById('login-overlay').style.display = 'none';
        localStorage.setItem('thai_auth', 'true');
        localStorage.setItem('auth_time', new Date().getTime());
    } else {
        const errorMsg = document.getElementById('error-msg');
        errorMsg.style.display = 'block';
        document.getElementById('passcode').value = '';
    }
}

// 頁面載入時的總初始化
window.addEventListener('load', () => {
    // 1. 執行密碼檢查
    const isAuth = localStorage.getItem('thai_auth');
    const authTime = localStorage.getItem('auth_time');
    const now = new Date().getTime();
    
    if (isAuth === 'true' && (now - authTime < 86400000)) {
        document.getElementById('login-overlay').style.display = 'none';
    }

    // 2. 啟動資料抓取
    initAllData();
});

// 置頂按鈕邏輯
window.onscroll = function() {
    const btn = document.getElementById("back-to-top");
    if (document.documentElement.scrollTop > 300) btn.style.display = "block";
    else btn.style.display = "none";
};

function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

    <button id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" style="position:fixed; bottom:20px; right:20px; width:45px; height:45px; border-radius:50%; background:var(--btn-active); color:white; border:none; display:none; z-index:99; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.3);">↑</button>
</body>
